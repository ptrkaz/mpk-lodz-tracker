name: Android CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-apk:
    needs: analyze-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # TODO: replace debug signing with upload keystore once generated.
      # Wire ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD /
      # ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD secrets and write
      # android/key.properties + decode keystore here.
      - name: Build release APK
        env:
          MAPTILER_KEY: ${{ secrets.MAPTILER_KEY }}
        run: flutter build apk --release --dart-define=MAPTILER_KEY=$MAPTILER_KEY

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
